<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Message</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">
  <main class="message-page">
    <p class="subtitle">a little birthday message just for you</p>

    <img src="assets/tamagotchi.png" alt="tamagotchi" class="tama-top" />

    <section class="content-wrap">
      <section class="letter-box" id="letterBox">
        <div class="party-stars" id="partyStars"></div>

        <div class="message-text">
          <p id="typedMessage"></p>
        </div>
      </section>

      <aside class="photo-stack">
        <div class="photo-card theme-beige">
          <img src="assets/photo1.jpg" alt="photo 1" />
          <span class="photo-emoji">🐈</span>
        </div>

        <div class="photo-card theme-strawberry">
          <img src="assets/photo2.jpg" alt="photo 2" />
          <span class="photo-emoji">🍓</span>
        </div>

        <div class="photo-card theme-blue">
          <img src="assets/photo3.jpg" alt="photo 3" />
          <span class="photo-emoji">🫧</span>
        </div>
      </aside>
    </section>

    <a href="index.html" class="back-btn">back</a>
  </main>

  <script src="script.js"></script>
</body>
</html>
